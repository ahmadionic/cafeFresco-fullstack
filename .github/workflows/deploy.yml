name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # =========================
  # 1️⃣ BUILD JOB
  # =========================
  build:
    name: Build Apps
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # Dashboard
      - name: Install Dashboard Dependencies
        working-directory: dashboard
        run: npm install

      - name: Build Dashboard
        working-directory: dashboard
        run: npm run build

  # =========================
  # 2️⃣ TEST JOB
  # =========================
  test:
    name: Run Tests
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Backend Tests
        working-directory: backend
        run: |
          npm install
          echo "No tests defined yet"

      - name: Run Frontend Tests
        working-directory: frontend
        run: |
          npm install
          echo "No tests defined yet"

  # =========================
  # 3️⃣ SECURITY CHECK
  # =========================
  security:
    name: Security Scan
    runs-on: self-hosted
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Backend Audit
        working-directory: backend
        run: |
          npm install
          npm audit || true

      - name: Frontend Audit
        working-directory: frontend
        run: |
          npm install
          npm audit || true

  # =========================
  # 4️⃣ DOCKER BUILD
  # =========================
  docker:
    name: Docker Build
    runs-on: self-hosted
    needs: security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker build -t backend ./backend
          docker build -t frontend ./frontend
          docker build -t dashboard ./dashboard

  # =========================
  # 5️⃣ DEPLOY TO EC2
  # =========================
  deploy:
    name: Deploy to EC2
    runs-on: self-hosted
    needs: docker

    steps:
      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > key.pem
          chmod 600 key.pem

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

            cd ~/cafeFresco-fullstack || exit

            echo "📥 Pull latest code"
            git pull origin main

            echo "🛑 Stop old containers"
            docker compose down

            echo "🚀 Start new containers"
            docker compose up -d --build

            echo "✅ Deployment Done"

          EOF
